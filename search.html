<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>検索</title>

        <link rel="stylesheet" href="css/search.css">
    </head>
    <body>
        <nav>
            <h1><a href="index.html" class="logo">Sake-index</a></h1>
            <ul class="menu">
                <li><a href="index.html">一覧</a></li>
                <li><a href="search.html">検索</a></li>
                <li><a href="register.html">追加</a></li>
                <li><a href="export.html">データ出力</a></li>
            </ul>
        </nav>
        <main>
            <div class="container">
                <a href="index.html">キャンセル</a>
                <h1>検索</h1>
                <form id="searchForm">
                    <div class="form-group">
                        <label for="name">酒名</label>
                        <input type="text" id= "name" name="name">
                    </div>
                    <div class="form-group">
                        <label for="rating">お気に入り度（指定値以上を検索）</label>
                        <input type="number" id="rating" name="rating"  min="1" max="5" step="1">
                    </div>
                    <!-- <div class="form-group">
                        <label>写真</label>
                        <div class="radioOption">
                            <input type="radio" id="fileChoice1" name="file" value="" checked />
                            <label for="fileChoice1">すべて</label>
                            <input type="radio" id="fileChoice2" name="file" value="y" />
                            <label for="fileChoice2">あり</label>
                            <input type="radio" id="fileChoice3" name="file" value="n" />
                            <label for="fileChoice3">なし</label>
                        </div> -->
                    <!-- </div> -->
                    <div class="form-group">
                        <label for="drinkDate">日付</label>
                        <input type="date" id="drinkDate" name="drinkDate">
                    </div>
                    <div class="form-group">
                        <label for="memo">一行メモ</label>
                        <input type="text" id="memo" name="memo">
                    </div>
                    <div class="form-group">
                        <label for="tags">タグ（完全一致、1つずつ検索）</label>
                        <input type="text" id="tags" name="tags">
                    </div>
                    <div class="form-group">
                        <label for="sweetness">甘い/辛い</label>
                        <select id="sweetness" name="sweetness">
                            <option value="">未選択</option>
                            <option value="-2">-2 = 甘い</option>
                            <option value="-1">-1 = やや甘い</option>
                            <option value="0">0 = 判断に迷う</option>
                            <option value="1">1 = やや辛い</option>
                            <option value="2">2 = 辛い</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="bodyLevel">軽い/重い</label>
                        <select id="bodyLevel" name="bodyLevel">
                            <option value="">未選択</option>
                            <option value="-2">-2 = 軽い</option>
                            <option value="-1">-1 = やや軽い</option>
                            <option value="0">0 = 判断に迷う</option>
                            <option value="1">1 = やや重い</option>
                            <option value="2">2 = 重い</option>
                        </select>
                    </div>
    
                    <button type="submit">検索</button>
                </form>
            </div>
        </main>
        <script type="module" src="js/search.js"></script>
    </body>
</html>
