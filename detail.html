<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>閲覧/編集</title>

        <link rel="stylesheet" href="css/detail.css">
    </head>
    <body>
        <nav>
            <h1><a href="index.html" class="logo">Sake-index</a></h1>
            <ul class="menu">
                <li><a href="index.html">一覧</a></li>
                <li><a href="search.html">検索</a></li>
                <li><a href="register.html">追加</a></li>
                <li><a href="export.html">データ出力</a></li>
            </ul>
        </nav>
        <main>
          <div class="container">
            <a href="index.html">キャンセル</a>
            <h1>閲覧/編集</h1>
            <div id="detail">
                <form action="" method="post" id="editForm">
                    <div class="form-group">
                        <label for="name">酒名<span class="required">必須</span></label>
                        <input type="text" id= "name" name="name" placeholder="例：獺祭　純米吟醸" required>
                    </div>
                    <div class="form-group">
                        <label>お気に入り度</label>
                        <div class="rating">
                            <input type="radio" id="star5" name="rating" value="5">
                            <label for="star5">★</label>
                            <input type="radio" id="star4" name="rating" value="4">
                            <label for="star4">★</label>
                            <input type="radio" id="star3" name="rating" value="3">
                            <label for="star3">★</label>
                            <input type="radio" id="star2" name="rating" value="2">
                            <label for="star2">★</label>
                            <input type="radio" id="star1" name="rating" value="1">
                            <label for="star1">★</label>
                        </div>
                    </div>
                    <!-- <div class="form-group">
                        <label for="file">写真</label>
                        <input type="file" id="file" name="file">
                    </div> -->
                    <div class="form-group">
                        <label for="drinkDate">日付</label>
                        <!--↓Javascriptで現在日付を取得すれば初期値に設定できる。-->
                        <input type="date" id="drinkDate" name="drinkDate" placeholder="yyyy/mm/dd">
                    </div>
                    <div class="form-group">
                        <label for="memo">一行メモ</label>
                        <input type="text" id="memo" name="memo" placeholder="例：辛口、冷酒向き">
                    </div>
                    <div class="form-group">
                        <label for="tags">タグ（カンマ区切り）</label>
                        <input type="text" id="tags" name="tags" placeholder="例：酸味, 食中酒, 山田錦">
                    </div>
                    <div class="form-group">
                        <label for="sweetness">甘い/辛い</label>
                        <div class="range-labels">
                            <span>甘い</span>
                            <span>やや甘い</span>
                            <span>判断に迷う</span>
                            <span>やや辛い</span>
                            <span>辛い</span>
                        </div>
                        <input id="sweetness" type="range" min="-2" max="2" step="1" value="0" />
                    </div>
                    <div class="form-group">
                        <label for="bodyLevel">軽い/重い</label>
                        <div class="range-labels">
                            <span>軽い</span>
                            <span>重い</span>
                        </div>
                        <input id="bodyLevel" type="range" min="-2" max="2" step="1" value="0" />
                    </div>
    
                    <button type="submit">更新</button>
                    <button id="deleteBtn" type="button">削除</button>
                </form>
            </div>
          </div>
      </main>
        <script type="module" src="js/detail.js"></script>
    </body>
</html>
